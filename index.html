<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Activos Musicales</title>
    <style>
        /* Estilos generales y fondo oscuro */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .main-container {
            max-width: 900px;
            width: 100%;
        }

        /* Contenedor de la Pancarta */
        .banner-container {
            margin-bottom: 35px;
            border-radius: 12px;
            overflow: hidden;
            /* Borde sutil dorado/bronce para que coincida con la imagen */
            border: 1px solid rgba(212, 175, 55, 0.4); 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            display: flex;
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block; /* Evita márgenes inferiores indeseados */
        }

        /* Título del catálogo */
        .catalog-title {
            text-align: center;
            color: #cca654; /* Tono dorado tenue */
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Cuadrícula de reproductores (Responsiva) */
        .grid-container {
            display: grid;
            /* En móviles mostrará 1 columna, en pantallas más anchas 2 o más */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        /* Tarjetas de audio */
        .audio-card {
            background-color: #0f0f0f;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        .audio-card:hover {
            border-color: #333;
        }

        .audio-card h3 {
            margin: 0 0 5px 0;
            font-size: 1rem;
            font-weight: 600;
        }

        .audio-card p {
            margin: 0 0 20px 0;
            font-size: 0.8rem;
            color: #888888;
        }

        /* Estilo del reproductor nativo */
        audio {
            width: 100%;
            height: 35px;
            outline: none;
        }

        /* Personalización sutil para navegadores basados en WebKit (Chrome/Edge/Safari) */
        audio::-webkit-media-controls-panel {
            background-color: #1a1a1a;
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #dddddd;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="banner-container">
            <img src="ruta_a_tu_imagen.jpg" alt="Ingeniería de Arquitectura Sonora y Minería Emocional" class="banner-img">
        </div>

        <div class="catalog-title">
            Catálogo de Activos Musicales Digitales
        </div>

        <div class="grid-container">
            
            <div class="audio-card">
                <h3>Cáliz del Viento</h3>
                <p>Rock Instrumental</p>
                <audio controls>
                    <source src="audio/caliz_del_viento.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="audio-card">
                <h3>Fuego en la Niebla</h3>
                <p>Reggae</p>
                <audio controls>
                    <source src="audio/fuego_en_la_niebla.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="audio-card">
                <h3>Mal del Puerco</h3>
                <p>Cumbia</p>
                <audio controls>
                    <source src="audio/mal_del_puerco.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="audio-card">
                <h3>Midnight Sanctuary</h3>
                <p>Folk Rock</p>
                <audio controls>
                    <source src="audio/midnight_sanctuary.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div class="audio-card">
                <h3>Prisionero de tu Amor</h3>
                <p>Romántica</p>
                <audio controls>
                    <source src="audio/prisionero_de_tu_amor.mp3" type="audio/mpeg">
                </audio>
            </div>

        </div>
    </div>

</body>
</html>
