<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Activos Musicales</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background-color: #0a0a0a;
            border: 1px solid #332b1a;
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            border-color: #d4af37;
            transform: translateY(-5px);
        }

        .title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 0; /* Eliminamos el margen inferior del título */
        }

        .genre {
            color: #a8a8a8;
            font-size: 0.95rem;
            /* Ajuste de espaciado: 8px suele ser el punto medio ideal */
            margin-top: 8px; 
            margin-bottom: 20px;
            display: block;
        }

        audio {
            width: 100%;
            height: 35px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.2);
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="grid">
        
        <div class="card">
            <div class="title">Cáliz del Viento</div>
            <span class="genre">Rock Instrumental</span>
            <audio controls src="tu-archivo-1.mp3"></audio>
        </div>

        <div class="card">
            <div class="title">Fuego en la Niebla</div>
            <span class="genre">Reggae</span>
            <audio controls src="tu-archivo-2.mp3"></audio>
        </div>

        <div class="card">
            <div class="title">Mal del Puerco</div>
            <span class="genre">Cumbia</span>
            <audio controls src="tu-archivo-3.mp3"></audio>
        </div>

        <div class="card">
            <div class="title">Midnight Sanctuary</div>
            <span class="genre">Folk Rock</span>
            <audio controls src="tu-archivo-4.mp3"></audio>
        </div>

    </div>
</div>

</body>
</html>
