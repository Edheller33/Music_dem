<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingeniería de Arquitectura Sonora</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Contenedor de la Pancarta */
        .banner-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .banner-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        /* Texto de Activos Digitales - Color más claro */
        .subtitulo-principal {
            color: #e0c08d; /* Dorado más claro y sutil */
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 40px;
        }

        /* Rejilla de canciones */
        .galeria-musical {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Tarjeta de canción */
        .tarjeta-cancion {
            border: 1px solid #c9a050;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            background: linear-gradient(145deg, #0f0f0f, #050505);
            transition: transform 0.3s ease;
        }

        .tarjeta-cancion:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(201, 160, 80, 0.2);
        }

        .titulo-pista {
            font-size: 18px;
            font-weight: 600;
            display: block;
            margin-bottom: 4px; /* Espacio controlado con el género */
        }

        .genero-pista {
            color: #c9a050; /* Dorado estándar para el género */
            font-size: 13px;
            font-weight: 300;
            text-transform: uppercase;
            display: block;
            margin-bottom: 15px; /* Espacio antes del reproductor */
        }

        audio {
            width: 100%;
            height: 35px;
            filter: sepia(20%) saturate(70%) grayscale(1) contrast(90%) invert(100%);
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <img src="pancarta_final.png" alt="Ingeniería de Arquitectura Sonora" class="banner-img">
    </div>

    <div class="subtitulo-principal">Catálogo de Activos Musicales Digitales</div>

    <div class="galeria-musical">

        <div class="tarjeta-cancion">
            <span class="titulo-pista">Cáliz del Viento</span>
            <span class="genero-pista">Rock Instrumental</span>
            <audio controls>
                <source src="caliz_del_viento.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="tarjeta-cancion">
            <span class="titulo-pista">Fuego en la Niebla</span>
            <span class="genero-pista">Reggae</span>
            <audio controls>
                <source src="fuego_en_la_niebla.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="tarjeta-cancion">
            <span class="titulo-pista">Mal del Puerco</span>
            <span class="genero-pista">Cumbia</span>
            <audio controls>
                <source src="mal_del_puerco.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="tarjeta-cancion">
            <span class="titulo-pista">Midnight Sanctuary</span>
            <span class="genero-pista">Folk Rock</span>
            <audio controls>
                <source src="midnight_sanctuary.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="tarjeta-cancion">
            <span class="titulo-pista">Prisionero de tu Amor</span>
            <span class="genero-pista">Romántica</span>
            <audio controls>
                <source src="prisionero_de_tu_amor.mp3" type="audio/mpeg">
            </audio>
        </div>

    </div>

</body>
</html>
