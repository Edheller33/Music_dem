<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Sanctuary - Edgar Romero</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .contenedor-reproductor {
            border: 2px solid #c9a050;
            border-radius: 25px;
            padding: 50px 30px;
            text-align: center;
            width: 320px;
            background: linear-gradient(145deg, #0f0f0f, #050505);
            box-shadow: 0 0 20px rgba(201, 160, 80, 0.2);
        }
        .artista {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .subtitulo {
            color: #c9a050;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 1.5px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }
        .titulo-pista {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
        }
        audio {
            width: 100%;
            height: 40px;
            border-radius: 20px;
            filter: sepia(20%) saturate(70%) grayscale(1) contrast(90%) invert(100%);
        }
    </style>
</head>
<body>

    <div class="contenedor-reproductor">
        <div class="artista">Edgar Romero</div>
        <div class="subtitulo">Ingeniería Sonora y Minería Emocional</div>
        
        <div class="titulo-pista">Midnight Sanctuary</div>
        
        <audio controls>
            <source src="midnight_sanctuary.mp3" type="audio/mpeg">
            Tu navegador no soporta la reproducción de audio.
        </audio>
    </div>

</body>
</html>
